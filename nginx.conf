server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing — redirect all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the API Gateway container
    location /auth/ {
        proxy_pass http://api-gateway:8090/auth/;
    }
    location /posts/ {
        proxy_pass http://api-gateway:8090/posts/;
    }
    location /comments/ {
        proxy_pass http://api-gateway:8090/comments/;
    }
    location /likes/ {
        proxy_pass http://api-gateway:8090/likes/;
    }
    location /follows/ {
        proxy_pass http://api-gateway:8090/follows/;
    }
    location /notifications/ {
        proxy_pass http://api-gateway:8090/notifications/;
    }
    location /messages/ {
        proxy_pass http://api-gateway:8090/messages/;
    }
    location /ws/chat {
        proxy_pass http://api-gateway:8090/ws/chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /media/ {
        proxy_pass http://api-gateway:8090/media/;
    }
    location /search/ {
        proxy_pass http://api-gateway:8090/search/;
    }
    location /payments/ {
        proxy_pass http://api-gateway:8090/payments/;
    }
}
